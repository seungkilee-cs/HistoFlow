server:
  port: 8080

spring:
  application:
    name: histoflow-backend
  
  datasource:
    url: jdbc:postgresql://localhost:5432/histoflow
    driver-class-name: org.postgresql.Driver
    username: histoflow
    password: histoflow123

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false

# MinIO Configuration (S3-compatible object storage)
minio:
  endpoint: http://minio:9000          # internal (Docker network)
  public-endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  buckets:
    tiles: histoflow-tiles
    uploads: unprocessed-slides
    
tiling:
  base-url: http://localhost:8000

# Logging Configuration
logging:
  level:
    root: INFO
    com.histoflow.backend: DEBUG
    software.amazon.awssdk: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"
