version: "3.9"

services:
  backend:
    environment:
      - ANALYSIS_BASE_URL=http://region-detector:8001
      - SPRING_JACKSON_MAPPER_REQUIRE_HANDLERS_FOR_JAVA8_TIMES=false
    depends_on:
      - postgres
      - minio
      - region-detector

  sk-regression:
    build:
      context: ../services/sk-regression
      dockerfile: Dockerfile
      target: pathology-classifier-cpu
    container_name: sk-regression
    shm_size: "1g"
    environment:
      - PYTHONPATH=/app
    volumes:
      - ../services/sk-regression:/app
      - ../services/sk-regression/data:/app/data
      - ../services/sk-regression/models:/app/models
      - ../services/sk-regression/logs:/app/logs
    depends_on:
      - minio
    # Keep container alive; run predict via `docker compose exec sk-regression ...`
    command: tail -f /dev/null
    profiles: ["cpu", "dev"]

  region-detector:
    build:
      context: ../services/region-detector
      dockerfile: Dockerfile
    container_name: region-detector
    shm_size: "1g"
    ports:
      - "${ANALYSIS_HOST_PORT:-8001}:8001"
    environment:
      - BACKEND_INTERNAL_BASE_URL=http://backend:8080
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_SECURE=false
      - TILES_BUCKET=histoflow-tiles
      - MODEL_PATH=/app/models/dinov2_classifier.pkl
    volumes:
      - ../services/region-detector/src:/app/src
      - ../services/justin-regression/models:/app/models
    depends_on:
      - minio
    profiles: ["cpu", "dev"]
